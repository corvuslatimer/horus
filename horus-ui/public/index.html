<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HORUS — OSINT Terminal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet" />
  <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
  <script src="https://unpkg.com/deck.gl@9.0.33/dist.min.js"></script>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:#0a0a0a;color:#f0f0f0;font-family:'Inter',sans-serif;height:100vh;display:flex;flex-direction:column;overflow:hidden}
    header{display:flex;justify-content:space-between;align-items:center;padding:10px 16px;border-bottom:1px solid #1e1e1e;background:#0d0d0d}
    .logo{display:flex;gap:10px;align-items:center}.logo-eye-mark{font-size:20px;filter:drop-shadow(0 0 5px rgba(212,177,90,.5));line-height:1}.logo-text{font-weight:700;letter-spacing:5px;color:#c8a84b;font-size:20px;line-height:1}.logo-sub{display:none}
    .status-bar{display:flex;gap:18px;font-size:11px;color:#888}.status-item{display:flex;gap:6px;align-items:center}.dot{width:6px;height:6px;border-radius:50%;background:#333}.dot.live{background:#4caf50;box-shadow:0 0 6px #4caf50}.dot.warn{background:#f0a500;box-shadow:0 0 6px #f0a500}

    .body{display:grid;grid-template-columns:420px minmax(0,1fr) 420px;flex:1;min-height:0}
    .panel{display:flex;flex-direction:column;min-height:0}
    .left{border-right:1px solid #1a1a1a}.right{border-left:1px solid #1a1a1a}
    .panel-header{padding:9px 14px;font-size:10px;letter-spacing:2px;color:#888;text-transform:uppercase;border-bottom:1px solid #1a1a1a;display:flex;justify-content:space-between;align-items:center}

    .feed,.market-scroll{flex:1;overflow-y:auto}.feed::-webkit-scrollbar,.market-scroll::-webkit-scrollbar,.chat-log::-webkit-scrollbar{width:4px}.feed::-webkit-scrollbar-thumb,.market-scroll::-webkit-scrollbar-thumb,.chat-log::-webkit-scrollbar-thumb{background:#222}
    .right-wrap{display:flex;flex-direction:column;flex:1;min-height:0}
    .market-scroll{flex:3;overflow-y:auto}
    .chat-wrap{flex:2;min-height:170px;border-top:1px solid #1a1a1a;background:#0b0b0b;display:flex;flex-direction:column}
    .chat-header{padding:8px 10px;font-size:10px;letter-spacing:2px;color:#888;border-bottom:1px solid #1a1a1a}
    .chat-log{flex:1;overflow-y:auto;padding:8px 10px;display:flex;flex-direction:column;gap:6px}
    .chat-msg{font-size:11px;line-height:1.35;padding:6px 8px;border-radius:6px;max-width:95%}
    .chat-msg.user{align-self:flex-end;background:#1b2a3d;color:#dbeafe}
    .chat-msg.assistant{align-self:flex-start;background:#1b1b1b;color:#ddd;border:1px solid #2a2a2a}
    .chat-form{display:flex;gap:6px;padding:8px;border-top:1px solid #1a1a1a}
    .chat-input{flex:1;background:#111;border:1px solid #2a2a2a;color:#ddd;font-size:12px;padding:7px 8px;border-radius:6px;outline:none}
    .chat-input:focus{border-color:#3a3a3a}
    .chat-send{background:#1f3a5a;border:1px solid #355170;color:#cfe8ff;padding:7px 10px;border-radius:6px;font-size:12px;cursor:pointer}

    .left-feed-wrap{display:flex;flex-direction:column;flex:1;min-height:0}
    .feed{flex:4;overflow-y:auto}
    .macro{flex:1;min-height:90px;border-top:1px solid #1a1a1a;background:#0b0b0b;padding:8px 10px}
    .macro-header{font-size:9px;letter-spacing:2px;color:#888;margin-bottom:7px}
    .macro-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
    .macro-item{border:1px solid #1a1a1a;background:#0f0f0f;padding:6px 8px;border-radius:4px}
    .macro-label{font-size:10px;color:#777;margin-bottom:3px}
    .macro-value{font-size:12px;color:#ddd;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .feed-item{padding:9px 14px;border-bottom:1px solid #111;animation:fade .2s ease;cursor:pointer}.feed-item:hover{background:#111}
    @keyframes fade{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}
    .feed-meta{display:flex;gap:7px;align-items:center;margin-bottom:4px}.feed-type{font-size:9px;padding:2px 6px;border-radius:2px;font-weight:700}.type-tweet{background:#1a2a3a;color:#4a9eda}.type-geo{background:#2a1a1a;color:#e05050}
    .feed-author{font-size:11px;color:#bbb;font-weight:600}.feed-time{margin-left:auto;font-size:10px;color:#555}.feed-text{font-size:11px;color:#ddd;line-height:1.45}

    #map-wrap{position:relative;min-height:0}
    #map{position:absolute;inset:0}
    .map-label{display:none}
    .map-legend{position:absolute;bottom:10px;left:14px;font-size:10px;color:#ddd;display:flex;gap:12px;background:rgba(0,0,0,.45);padding:4px 8px;border:1px solid #333;z-index:5}
    .legend-dot{width:7px;height:7px;border-radius:50%;display:inline-block;margin-right:4px}

    .market-item{padding:12px 14px;border-bottom:1px solid #111}.market-question{font-size:11px;color:#ddd;margin-bottom:8px;line-height:1.4}
    .market-odds{display:flex;gap:6px;align-items:center}.odds-yes{color:#50c050;font-weight:700;font-size:14px;min-width:58px}.odds-no{color:#e05050;font-weight:700;font-size:14px;min-width:42px;text-align:right}
    .odds-bar{flex:1;height:4px;background:#1a1a1a;border-radius:2px;overflow:hidden}.odds-fill{height:100%;background:linear-gradient(90deg,#50c050,#c8a84b)}.market-vol{font-size:10px;color:#666;margin-top:4px}

    footer{padding:5px 20px;border-top:1px solid #1a1a1a;font-size:10px;color:#555;display:flex;justify-content:space-between}
    .gold{color:#c8a84b}.connecting{padding:30px 14px;color:#444;font-size:11px}
  </style>
</head>
<body>
<header>
  <div class="logo"><div class="logo-eye-mark">𓂀</div><div class="logo-text">HORUS</div></div>
  <div class="status-bar">
    <div class="status-item"><div class="dot" id="dot-feed"></div><span id="status-feed">CONNECTING</span></div>
    <div class="status-item"><div class="dot" id="dot-market"></div><span id="status-market">MARKETS</span></div>
    <div class="status-item"><span id="utc-time">--:--:-- UTC</span></div>
  </div>
</header>
<div class="body">
  <div class="panel left">
    <div class="panel-header"><span>LIVE SIGNAL FEED</span><span class="gold" id="sig-count">0 signals</span></div>
    <div class="left-feed-wrap">
      <div class="feed" id="feed"><div class="connecting">INITIALIZING FEED…</div></div>
      <div class="macro" id="macro">
        <div class="macro-header">MAJOR INDICES</div>
        <div class="macro-grid">
          <div class="macro-item">
            <div class="macro-label">BTC/USD</div>
            <div class="macro-value gold" id="btc-price">--</div>
          </div>
          <div class="macro-item">
            <div class="macro-label">S&P 500</div>
            <div class="macro-value" id="spx">waiting api</div>
          </div>
          <div class="macro-item">
            <div class="macro-label">NASDAQ</div>
            <div class="macro-value" id="ndx">waiting api</div>
          </div>
          <div class="macro-item">
            <div class="macro-label">DXY</div>
            <div class="macro-value" id="dxy">waiting api</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div id="map-wrap">
    <div id="map"></div>
    
    <div class="map-legend">
      <span><span class="legend-dot" style="background:#ef4444"></span>HOTSPOT</span>
      <span><span class="legend-dot" style="background:#f59e0b"></span>FLIGHT</span>
      <span><span class="legend-dot" style="background:#38bdf8"></span>TRAIL</span>
    </div>
  </div>

  <div class="panel right">
    <div class="panel-header"><span>POLYMARKET — LIVE ODDS</span><span class="gold" id="market-count"></span></div>
    <div class="right-wrap">
      <div class="market-scroll" id="markets"><div class="connecting">LOADING MARKETS…</div></div>
      <div class="chat-wrap">
        <div class="chat-header">AGENT CHAT</div>
        <div class="chat-log" id="chat-log"></div>
        <form class="chat-form" id="chat-form">
          <input id="chat-input" class="chat-input" placeholder="Ask your agent..." autocomplete="off" />
          <button class="chat-send" type="submit">Send</button>
        </form>
      </div>
    </div>
  </div>
</div>
<footer><span>HORUS v0.2</span><span>Built by <span class="gold">CORVUS LATIMER</span> · <a href="https://x.com/CorvusLatimer" target="_blank" rel="noopener" style="color:#4a9eda;text-decoration:none">@CorvusLatimer</a></span><span id="total-signals" style="display:none">0</span><span id="users-online" style="display:none">0</span></footer>

<script>
setInterval(()=>{const n=new Date();document.getElementById('utc-time').textContent=[n.getUTCHours(),n.getUTCMinutes(),n.getUTCSeconds()].map(x=>String(x).padStart(2,'0')).join(':')+' UTC'},1000);

const feed=document.getElementById('feed');let signalCount=0,firstSignal=true;
const esc=s=>String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
function addSignal(type,author,text,url=null){if(firstSignal){feed.innerHTML='';firstSignal=false}signalCount++;document.getElementById('sig-count').textContent=signalCount+' signals';const ts=document.getElementById('total-signals');if(ts)ts.textContent=signalCount;const n=new Date();const t=[n.getUTCHours(),n.getUTCMinutes(),n.getUTCSeconds()].map(x=>String(x).padStart(2,'0')).join(':');const item=document.createElement('div');item.className='feed-item';item.innerHTML=`<div class="feed-meta"><span class="feed-type type-${type}">${type}</span><span class="feed-author">${esc(author)}</span><span class="feed-time">${t} UTC</span></div><div class="feed-text">${esc(text)}</div>`;if(url){item.addEventListener('click',()=>window.open(url,'_blank','noopener'));}feed.insertBefore(item,feed.firstChild);while(feed.children.length>220)feed.removeChild(feed.lastChild)}

// Map (WebGL-safe fallback via Leaflet)
const HOTSPOTS=[
  {name:'Israel/Gaza',coordinates:[32,35],severity:0.9},
  {name:'Iran',coordinates:[35.7,51.4],severity:1.0},
  {name:'Ukraine',coordinates:[49,32],severity:0.85},
  {name:'Kuwait',coordinates:[29.3,47.9],severity:0.65},
  {name:'Yemen',coordinates:[15,42],severity:0.7},
  {name:'Sudan',coordinates:[15.5,32.5],severity:0.55}
];

let flights=[]; let trails=[];
const MIL=['RCH','CMB','RRR','CNV','LAGR','QID','NATO','FORTE','DUKE','HOMER','MOOSE','TITAN','GHOST'];
const history={};
const norm=c=>(c||'').trim().toUpperCase();

const map = L.map('map', { zoomControl:true, worldCopyJump:true }).setView([25, 38], 2);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 8, minZoom: 2, attribution:'© OSM' }).addTo(map);

const hotspotLayer = L.layerGroup().addTo(map);
const flightLayer = L.layerGroup().addTo(map);
const trailLayer = L.layerGroup().addTo(map);

function renderLayers(){
  hotspotLayer.clearLayers(); flightLayer.clearLayers(); trailLayer.clearLayers();

  HOTSPOTS.forEach(h => {
    L.circle([h.coordinates[0], h.coordinates[1]], {
      radius: 50000 + h.severity*70000,
      color: '#ef4444', weight: 1, fillColor:'#ef4444', fillOpacity:0.28
    }).bindTooltip(h.name).addTo(hotspotLayer);
  });

  trails.forEach(t => {
    L.polyline(t.path, { color: t.color, weight: 2, opacity: 0.75 }).addTo(trailLayer);
  });

  flights.forEach(f => {
    L.circleMarker([f.lat, f.lon], {
      radius: 4, color: f.color, weight: 1, fillColor:f.color, fillOpacity:0.95
    }).bindTooltip(f.label).addTo(flightLayer);
  });
}

async function loadFlights(){
  try{
    const r=await fetch('http://localhost:8787/api/flights');
    const j=await r.json();
    const st=Array.isArray(j?.flights)?j.flights:[];
    const nextFlights=[]; const nextTrails=[];

    for(const x of st){
      const cs=norm(x.callsign); const lon=x.lon,lat=x.lat,speed=x.speedKmh,icao=(x.icao24||'').toUpperCase();
      if(typeof lat!=='number'||typeof lon!=='number') continue;
      const high = cs.length>=4;
      const color = high ? '#f59e0b' : '#38bdf8';

      nextFlights.push({lat, lon, label:`MIL ${cs||'UNKNOWN'}${speed?` · ${speed} km/h`:''}`, color});

      const key = cs || icao || `${lat.toFixed(2)},${lon.toFixed(2)}`;
      history[key]=history[key]||[];
      history[key].push([lat,lon]);
      if(history[key].length>16) history[key].shift();
      if(history[key].length>=2) nextTrails.push({path:history[key], color});

      if(nextFlights.length>=120) break;
    }

    flights=nextFlights; trails=nextTrails; renderLayers();
    addSignal('geo','flight-layer',`Flight layer: ${flights.length} aircraft · ${trails.length} trails`);
  }catch(e){ }
}

map.whenReady(()=>{renderLayers();loadFlights();setInterval(loadFlights,30000)});
// J7 feed
const J7='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJ1c2VybmFtZSI6IjB4enluel8xNDI5OTY4MTM0MzA3MTg4ODc4IiwiaXAiOiIxMDguNTQuMTczLjE0OSIsInR5cGUiOiJhY2Nlc3MiLCJpYXQiOjE3NzIzMjcwMjUsImV4cCI6MTc3MjkzMTgyNX0.ctfE9ILOvSx8aufn-OUHc1z1-Kjz_dedr8ggIaGD_oQ';
function connectJ7(){
  const ws=new WebSocket('wss://j7tracker.io/socket.io/?EIO=4&transport=websocket');
  const d=document.getElementById('dot-feed'),st=document.getElementById('status-feed');
  ws.onopen=()=>{ws.send('40');setTimeout(()=>ws.send('42["user_connected","'+J7+'"]'),500);d.className='dot live';st.textContent='LIVE'};
  ws.onmessage=e=>{const raw=e.data;if(raw==='2'){ws.send('3');return}if(!raw.startsWith('42['))return;try{const p=JSON.parse(raw.slice(2));if(p[0]==='tweet'&&p[1]?.text?.length>5)addSignal('tweet',p[1].author?'@'+p[1].author.handle:'unknown',p[1].text,p[1].tweetUrl);if(p[0]==='connected_users'&&Array.isArray(p[1])){const u=document.getElementById('users-online');if(u)u.textContent=p[1].length;}}catch{}};
  ws.onclose=()=>{d.className='dot warn';st.textContent='RECONNECTING';setTimeout(connectJ7,3000)};
  ws.onerror=()=>ws.close();
}


async function loadBtc(){
  const el = document.getElementById('btc-price');
  if(!el) return;

  // 1) Try Gemini (rich ticker incl 24h change)
  try{
    const r = await fetch('http://localhost:8787/api/btc');
    const j = await r.json();
    const last = Number(j?.last);
    const changePct = Number(j?.percentChange24h);
    if(Number.isFinite(last)){
      const changeTxt = Number.isFinite(changePct)
        ? ` (${changePct >= 0 ? '+' : ''}${(changePct*100).toFixed(2)}%)`
        : '';
      el.textContent = '$' + last.toLocaleString(undefined,{maximumFractionDigits:2}) + changeTxt;
      el.style.color = Number.isFinite(changePct) ? (changePct >= 0 ? '#50c050' : '#e05050') : '#ddd';
      return;
    }
  }catch(e){ /* fallback below */ }

  // 2) Fallback to CoinGecko (price only)
  try{
    const r2 = await fetch('http://localhost:8787/api/btc');
    const j2 = await r2.json();
    const p = Number(j2?.bitcoin?.usd);
    if(Number.isFinite(p)){
      el.textContent = '$' + p.toLocaleString() + ' (spot)';
      el.style.color = '#ddd';
      return;
    }
  }catch(e){ }

  el.textContent = 'feed unavailable';
  el.style.color = '#888';
}

async function loadMarkets(){
  const c=document.getElementById('markets');
  try{
    const r=await fetch('https://gamma-api.polymarket.com/markets?limit=25&active=true&order=volume&ascending=false');
    const mk=await r.json();
    document.getElementById('dot-market').className='dot live';
    document.getElementById('market-count').textContent=mk.length+' markets';
    c.innerHTML='';
    mk.forEach(m=>{let y=null,n=null;try{const p=JSON.parse(m.outcomePrices);y=p[0];n=p[1]}catch{}if(!y)return;const yp=Math.round(parseFloat(y)*100),np=Math.round(parseFloat(n||0)*100),vol=m.volume?'$'+Number(m.volume).toLocaleString(undefined,{maximumFractionDigits:0}):'—';const it=document.createElement('div');it.className='market-item';it.innerHTML=`<div class="market-question">${esc(m.question)}</div><div class="market-odds"><span class="odds-yes">YES ${yp}%</span><div class="odds-bar"><div class="odds-fill" style="width:${yp}%"></div></div><span class="odds-no">${np}%</span></div><div class="market-vol">Vol: ${vol}</div>`;c.appendChild(it)});
  }catch{c.innerHTML='<div class="connecting">MARKETS UNAVAILABLE</div>'}
}


function pushChat(role,text){
  const log=document.getElementById('chat-log'); if(!log) return;
  const d=document.createElement('div'); d.className='chat-msg '+role; d.textContent=text;
  log.appendChild(d); log.scrollTop=log.scrollHeight;
}

async function loadChatHistory(){
  try{
    const r=await fetch('http://localhost:8787/api/chat');
    const j=await r.json();
    const log=document.getElementById('chat-log'); if(!log) return;
    log.innerHTML='';
    (j.messages||[]).slice(-20).forEach(m=>pushChat(m.role==='user'?'user':'assistant', m.text||''));
  }catch{}
}

async function sendChat(message){
  const r=await fetch('http://localhost:8787/api/chat', {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({message})
  });
  const j=await r.json();
  if(j?.reply?.text) pushChat('assistant', j.reply.text);
}

const chatForm=document.getElementById('chat-form');
if(chatForm){
  chatForm.addEventListener('submit', async (e)=>{
    e.preventDefault();
    const input=document.getElementById('chat-input');
    const msg=(input?.value||'').trim();
    if(!msg) return;
    pushChat('user', msg);
    input.value='';
    try{ await sendChat(msg); }
    catch{ pushChat('assistant','Chat relay unavailable right now.'); }
  });
}

connectJ7();
loadBtc(); setInterval(loadBtc,15000);
loadMarkets();setInterval(loadMarkets,30000);
loadChatHistory();
</script>
</body>
</html>
